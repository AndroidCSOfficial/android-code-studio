name: Android CI - Root Fix

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Root Level Clean & Build
        run: |
          # 1. Jad se saaf karo (Purani cache aur build files khatam)
          rm -rf .gradle
          rm -rf build
          ./gradlew clean
          
          # 2. Force Build (Network errors se bachne ke liye offline mode hata kar)
          ./gradlew :core:app:assembleDebug --stacktrace --refresh-dependencies
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: app-debug-apk
          path: core/app/build/outputs/apk/debug/
