name: AI-Managed Strict Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Deep Clean & Precise Build
        run: |
          echo "AI-System: Initiating Deep Clean..."
          # 1. Purani build files ko poori tarah delete karein
          ./gradlew clean
          
          # 2. Build shuru karein (Strict mode mein)
          # Agar koi duplicate resource hogi, ye turant rok dega
          ./gradlew :core:app:assembleDebug --stacktrace --warning-mode all
        
      - name: Final Integrity Check
        if: success()
        run: echo "Build successful and verified."

      - name: Log Analysis (If Failure)
        if: failure()
        run: |
          echo "AI-System: Build Failed. Analyzing logs for duplicates..."
          # Error ko highlight karne ke liye specific command
          grep -rn "Error: Found item" . || echo "Check the logs above for specific resource errors."
