name: Build and test

on:
  push:
    branches: 
      - "dev"
      - "main" 
      - "indexing"
      - "release/**"
    paths-ignore:
      - '**.md'
      - 'fastlane/**'
      - '.github/workflows/crowdin_contributors.yml'
  pull_request:
    branches: [ "dev" ]
    paths-ignore:
      - '**.md'
      - 'fastlane/**'
      - '.github/workflows/crowdin_contributors.yml'
  workflow_dispatch: { }

jobs:
  build_release_apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Change Gradle wrapper permissions
        run: chmod +x ./gradlew
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Assemble Release APK
        run: ./gradlew :core:app:assembleRelease
      - name: List APK files (debug)
        run: ls -la core/app/build/outputs/apk/release/
      - name: Upload arm64-v8a Release APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-arm64-v8a-release
          path: core/app/build/outputs/apk/release/*arm64-v8a*.apk
        if: always()
      - name: Upload armeabi-v7a Release APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-armeabi-v7a-release
          path: core/app/build/outputs/apk/release/*armeabi-v7a*.apk
        if: always()
      - name: Upload x86_64 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-x86_64-release
          path: core/app/build/outputs/apk/release/*x86_64*.apk
        if: always()
      - name: Upload universal Release APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-universal-release
          path: core/app/build/outputs/apk/release/*universal*.apk
        if: always()