name: Build Android Code Studio

on:
  push:
    branches: [ "dev", "main", "indexing", "release/**" ]
  workflow_dispatch: { }

jobs:
  build_all_apks:
    name: Build Debug and Release APKs
    runs-on: ubuntu-latest
    
    # Global settings for High-Memory Projects
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m' -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Project Structure & Permissions
        # Ye step 'appintro' missing aur permissions ke errors ko jad se khatam karega
        run: |
          chmod +x ./gradlew
          find . -name "gradlew" -exec chmod +x {} +
          # Missing composite folders ko initialize karna
          mkdir -p composite-builds/build-logic
          [ -f composite-builds/build-logic/settings.gradle ] || touch composite-builds/build-logic/settings.gradle
          # SDK path aur basic signing bypass ke liye properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v3-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build All APK Variants
        # 'assemble' command pure project ke saare modules ko compile karegi
        # -x validateSigningDebug se bina key ke bhi APK ban jayegi
        run: |
          ./gradlew assemble -x validateSigningDebug --stacktrace --no-daemon --max-workers=2

      - name: Upload Generated APKs
        uses: actions/upload-artifact@v4
        with:
          name: AndroidCodeStudio-Full-Build
          path: '**/build/outputs/apk/**/*.apk'
          if-no-files-found: warn

      - name: Build Failure Report
        if: failure()
        run: |
          echo "Listing all project modules to find the missing one:"
          ./gradlew projects
          find . -maxdepth 3 -name "build.gradle"
