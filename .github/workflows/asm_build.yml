name: Android CI - Final Perfect Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permissions
        run: chmod +x gradlew

      - name: Deep Clean & Build
        run: |
          # 1. Purani sabhi files ko jad se saaf karo
          ./gradlew clean
          rm -rf .gradle
          rm -rf build
          
          # 2. Build process start (Parallelism band ki hai taaki conflict na ho)
          ./gradlew :core:app:assembleDebug --no-daemon --stacktrace
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: app-debug-apk
          # Yahan .apk extension specify kar diya hai taaki file identify ho
          path: core/app/build/outputs/apk/debug/*.apk
