name: Build Android Code Studio

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch: { }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Repo aur Submodules download karna
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # Step 2: Java Setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      # Step 3: Gradle Sync aur Caches ko Refresh karna
      # Yahan hum 'clean' command chala rahe hain jo puraana sab kuch delete kar dega
      - name: Gradle Clean and Sync
        run: |
          chmod +x ./gradlew
          ./gradlew clean
          ./gradlew build --refresh-dependencies

      # Step 4: Final APK Build (Release)
      - name: Build APK (Release)
        run: ./gradlew :core:app:assembleRelease
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          KEY_ALIAS: "AndroidCS"

      # Step 5: APK upload karna
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-code-studio-apk
          path: core/app/build/outputs/apk/release/*.apk
        if: always()
