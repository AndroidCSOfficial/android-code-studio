name: Build Android Code Studio

on:
  push:
    branches: [ "dev", "main", "indexing", "release/**" ]
  workflow_dispatch: { }

jobs:
  build_complete_system:
    name: Full System Compilation
    runs-on: ubuntu-latest
    
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m' -Dorg.gradle.parallel=true"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Sync Composite Build Structure
        # Ye step 'appintro' aur 'build-logic' ke errors ko jad se khatam karega
        run: |
          chmod +x ./gradlew
          
          # 1. build-logic file inject karna
          mkdir -p composite-builds/build-logic
          cat <<EOF > composite-builds/build-logic/settings.gradle.kts
          @file:Suppress("UnstableApiUsage")
          enableFeaturePreview("TYPESAFE_PROJECT_ACCESSORS")
          dependencyResolutionManagement {
            includeBuild("../build-deps-common") {
              dependencySubstitution {
                substitute(module("com.tom.rv2ide.build:desugaring-core")).using(project(":desugaring-core"))
              }
            }
            repositories {
              maven { url = uri("https://maven.aliyun.com/repository/central") }
              maven { url = uri("https://maven.aliyun.com/repository/google") }
              google(); mavenCentral()
            }
            versionCatalogs {
              create("libs") { from(files("../../gradle/libs.versions.toml")) }
            }
          }
          include(":common", ":desugaring", ":desugaring-core", ":plugins", ":properties-parser")
          rootProject.name = "build-logic"
          EOF

          # 2. build-deps-common file inject karna
          mkdir -p composite-builds/build-deps-common
          cat <<EOF > composite-builds/build-deps-common/settings.gradle.kts
          @file:Suppress("UnstableApiUsage")
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
            repositories { google(); mavenCentral() }
            versionCatalogs { create("libs") { from(files("../../gradle/libs.versions.toml")) } }
          }
          include(":desugaring-core")
          rootProject.name = "build-deps-common"
          EOF

          # 3. local.properties fix
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          # Force AndroidX taaki Duplicate Class error na aaye
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build All APKs
        # assembleDebug aur assembleRelease dono variants banayega
        run: |
          ./gradlew assemble -x validateSigningDebug --stacktrace --no-daemon --max-workers=2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AndroidCodeStudio-Full-APKs
          path: '**/build/outputs/apk/**/*.apk'
          if-no-files-found: error
