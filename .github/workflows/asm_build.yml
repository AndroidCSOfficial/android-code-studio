name: Build Android Code Studio

on:
  push:
    branches: [ "dev", "main", "indexing", "release/**" ]
  workflow_dispatch: { }

jobs:
  build_ide_system:
    name: Full Build System
    runs-on: ubuntu-latest
    
    # 4GB RAM ka limit taaki Heap Space error na aaye
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4096m -XX:MaxMetaspaceSize=1024m' -Dorg.gradle.parallel=true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Environment
        run: |
          chmod +x ./gradlew
          # Ensure local.properties for SDK path
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          # Jetifier is crucial for older libraries in AndroidIDE
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build All Variants
        # 'assemble' command pure tree structure ko traverse karegi
        # -x validateSigningDebug signing key errors ko avoid karega
        run: |
          ./gradlew assemble \
          --stacktrace \
          --no-daemon \
          -x validateSigningDebug \
          -Pandroid.injected.signing.store.file=signing/signing-key.jks

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: AndroidCodeStudio-Build-Artifacts
          path: '**/build/outputs/apk/**/*.apk'
          if-no-files-found: error
