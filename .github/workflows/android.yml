name: Build Android Code Studio

on:
  push:
    branches: [ "dev", "main" ]
  workflow_dispatch: { }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Grant Gradle Permissions
        run: chmod +x ./gradlew
      - name: Build Debug APK
        # Root se build command chalayein, ye saare dependencies resolve kar lega
        run: ./gradlew :core:app:assembleDebug -x validateSigningDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AndroidCodeStudio-Debug
          path: core/app/build/outputs/apk/debug/*.apk
