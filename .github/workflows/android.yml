name: Android Build Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  workflow_dispatch: { }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Composite Builds Permissions
        # Composite builds ke andar ke gradlew ko bhi permission deni hogi
        run: |
          chmod +x ./gradlew
          find . -name "gradlew" -exec chmod +x {} +

      - name: Build with Optimized Resources
        run: |
          # --configure-on-demand se sirf zaruri modules load honge
          # jvmargs ko 4GB rakha hai taki RAM crash na ho
          ./gradlew assembleDebug -x validateSigningDebug \
          --no-daemon --max-workers=2 --configure-on-demand \
          -Dorg.gradle.jvmargs="-Xmx4096m -XX:+UseParallelGC"
        env:
          MAIN_VERSION: "1.0.0"
          REVISION_NUM: "03"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: AndroidCodeStudio-Build
          path: '**/build/outputs/apk/**/*.apk'
