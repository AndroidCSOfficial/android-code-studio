name: Build Android Code Studio

on:
  push:
    branches: [ "dev", "main", "indexing", "release/**" ]
  workflow_dispatch: { }

jobs:
  build_release_apk:
    name: Build All APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Change Gradle wrapper permissions
        run: chmod +x ./gradlew
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      # Yahan humne path ko handle kiya hai taaki error na aaye
      - name: Assemble All APKs
        run: ./gradlew assembleDebug
        
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: all-debug-apks
          path: '**/build/outputs/apk/debug/*.apk'
        if: always()
